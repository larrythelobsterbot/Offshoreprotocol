# /etc/nginx/sites-available/flowdirty.fun
#
# FlowDirty.fun — public landing + wallet tracker.
# Whitelist approach: only specific paths are proxied to the operator's
# fastify backend. Anything else returns 404. Defense in depth — even if
# the backend exposes private routes, this vhost can't reach them.
#
# Cloudflare proxies the domain (orange cloud), so all traffic arrives
# from Cloudflare IPs. If you want to harden further, add `set_real_ip_from`
# entries for CF's published IP ranges and enable UFW to drop direct VPS
# inbound on 80/443.

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name flowdirty.fun www.flowdirty.fun;

    # ── TLS for CF→origin connections only ──
    # Self-signed cert; Cloudflare's "Full" SSL mode accepts any cert at the
    # origin (it doesn't validate). Public visitors never see this cert —
    # CF terminates and re-encrypts with its own Universal SSL cert at the
    # edge. Self-signed = NOT in Certificate Transparency logs (only public
    # CA-issued certs are logged), so this preserves the domain isolation
    # we verified via crt.sh earlier.
    ssl_certificate     /etc/ssl/certs/flowdirty.fun.crt;
    ssl_certificate_key /etc/ssl/private/flowdirty.fun.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Privacy protection ──
    # We DON'T enforce a CF-only gate at the nginx layer because:
    #   1. Per-vhost allow/deny conflicts with `real_ip_header` (rewrites
    #      source IP to end-user, breaking CIDR ACLs).
    #   2. nginx `if` at server level interacts weirdly with location
    #      types (exact `=` bypasses it, prefix doesn't).
    # The privacy story relies instead on:
    #   • Cloudflare DNS proxy (orange cloud) — VPS IP not in public DNS
    #   • crt.sh hygiene — no shared SAN entries linking flowdirty.fun
    #     to lekker.design family
    #   • Data exposed here is all public-safe by design (no operator
    #     wallet, no corp state, no bot signer)
    # An attacker who discovers the VPS IP can hit the page directly
    # by sending Host: flowdirty.fun, but the worst they get is the
    # public landing page — the same content any visitor sees via CF.

    # ── Static landing page (Glass — wallet tracker) ──
    root /home/muffinman/Offshoreprotocol/flowdirty;
    index index.html;

    # ── Hardening headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Pass real client IP (Cloudflare-aware) to the backend ──
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ── Public terminal route (gaming arcade) — to be added in Phase 3b ──
    location = /terminal {
        try_files /terminal.html =404;
    }

    # ── Public wallet tracker API ──
    # /api/track-stats and /api/network/state are exact matches (below).
    # /api/track/<wallet> uses a prefix match — fastify's JSON-Schema regex
    # validates the wallet format on its end and returns 400 for malformed
    # input, so we don't need the strict regex at the nginx level.
    location /api/track/ {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /api/track-stats {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    location = /api/network/state {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── Public WS for the gaming terminal ──
    location = /ws/network {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ── Static fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block everything else explicitly ──
    # /api/state, /api/op-result, /ws (operator WS) etc are NOT reachable here.
    location /api/ { return 404; }
    location /ws  { return 404; }

    # No directory listing, no hidden files
    location ~ /\. { return 404; }
    autoindex off;
}
