# /etc/nginx/sites-available/flowdirty.fun
#
# FlowDirty.fun — public landing + wallet tracker.
# Whitelist approach: only specific paths are proxied to the operator's
# fastify backend. Anything else returns 404. Defense in depth — even if
# the backend exposes private routes, this vhost can't reach them.
#
# Cloudflare proxies the domain (orange cloud), so all traffic arrives
# from Cloudflare IPs. If you want to harden further, add `set_real_ip_from`
# entries for CF's published IP ranges and enable UFW to drop direct VPS
# inbound on 80/443.

server {
    listen 80;
    listen [::]:80;
    server_name flowdirty.fun www.flowdirty.fun;

    # ── Static landing page (Glass — wallet tracker) ──
    root /home/muffinman/Offshoreprotocol/flowdirty;
    index index.html;

    # ── Hardening headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Pass real client IP (Cloudflare-aware) to the backend ──
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ── Public terminal route (gaming arcade) — to be added in Phase 3b ──
    location = /terminal {
        try_files /terminal.html =404;
    }

    # ── Public wallet tracker API ──
    # Whitelist: only /api/track and /api/track-stats and /api/network/state
    # Strict regex on the wallet path keeps malformed inputs out at the edge.
    location ~ "^/api/track/(0x[0-9a-fA-F]{40})$" {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /api/track-stats {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    location = /api/network/state {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # ── Public WS for the gaming terminal ──
    location = /ws/network {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # ── Static fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block everything else explicitly ──
    # /api/state, /api/op-result, /ws (operator WS) etc are NOT reachable here.
    location /api/ { return 404; }
    location /ws  { return 404; }

    # No directory listing, no hidden files
    location ~ /\. { return 404; }
    autoindex off;
}
